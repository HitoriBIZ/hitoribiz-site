name: Newsletter scheduled delivery

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  call-newsletter-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Call HitoriBIZ newsletter scheduled delivery API
        env:
          CRON_SECRET: ${{ secrets.NEWSLETTER_CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "NEWSLETTER_CRON_SECRET is not set."
            exit 1
          fi

          response_file="$(mktemp)"
          status_code="$(
            curl \
              --silent \
              --show-error \
              --output "$response_file" \
              --write-out "%{http_code}" \
              --header "Authorization: Bearer $CRON_SECRET" \
              https://www.hitori-biz.com/api/newsletter/cron/send-scheduled
          )"

          cat "$response_file"
          echo
          echo "HTTP status: $status_code"

          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            exit 1
          fi
